<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema X | Estadísticas</title>
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div class="content-wrapper">
        <section class="content-header"><h1>Estadísticas de mi Cuenta</h1></section>
        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card card-primary">
                            <div class="card-header"><h3 class="card-title">Resumen de Movimientos (Montos)</h3></div>
                            <div class="card-body"><canvas id="pieChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card card-success">
                            <div class="card-header"><h3 class="card-title">Comparativa Entradas/Salidas</h3></div>
                            <div class="card-body"><canvas id="barChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/chart.js/Chart.min.js}"></script>

<script th:inline="javascript">
    $(function () {
      // 1. Extraer datos del modelo de Spring
      var totalEntradas = /*[[${totalEntradas}]]*/ 0;
      var totalSalidas = /*[[${totalSalidas}]]*/ 0;

      // 2. PIE CHART - Comparación porcentual
      var pieData = {
        labels: ['Entradas', 'Salidas'],
        datasets: [{
          data: [totalEntradas, totalSalidas],
          backgroundColor: ['#00a65a', '#f56954'],
        }]
      }
      var pieChartCanvas = $('#pieChart').get(0).getContext('2d')
      new Chart(pieChartCanvas, {
          type: 'pie',
          data: pieData,
          options: { responsive: true, maintainAspectRatio: false }
      })

      // 3. BAR CHART - Comparación visual
      var barData = {
        labels: ['Movimientos'],
        datasets: [
          {
            label: 'Entradas',
            backgroundColor: '#00a65a',
            data: [totalEntradas]
          },
          {
            label: 'Salidas',
            backgroundColor: '#f56954',
            data: [totalSalidas]
          }
        ]
      }
      var barChartCanvas = $('#barChart').get(0).getContext('2d')
      new Chart(barChartCanvas, {
          type: 'bar',
          data: barData,
          options: { responsive: true, maintainAspectRatio: false }
      })
    })
</script>
</body>
</html>
