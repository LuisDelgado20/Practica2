<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema X | Nuevo Movimiento</title>
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<<div class="wrapper">

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <h1>Registrar Nuevo Movimiento</h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card card-primary">
                    <div class="card-header">
                        <h3 class="card-title">Datos de la Transacción</h3>
                    </div>

                    <form th:action="@{/transacciones/guardar}" th:object="${movimiento}" method="post">
                        <div class="card-body">

                            <div class="form-group">
                                <label for="cuenta">Seleccionar Cuenta</label>
                                <select class="form-control" id="cuenta" th:field="*{cuenta.id}" required>
                                    <option value="" disabled selected>Seleccione una cuenta...</option>
                                    <option th:each="c : ${cuentas}"
                                            th:value="${c.id}"
                                            th:text="${c.titular + ' - Saldo actual: $' + c.saldo}"></option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="monto">Monto de la operación ($)</label>
                                <input type="number" step="0.01" class="form-control" id="monto"
                                       th:field="*{monto}" placeholder="0.00" required>
                            </div>

                            <div class="form-group">
                                <label for="tipo">Tipo de Movimiento</label>
                                <select class="form-column form-control" id="tipo" th:field="*{tipo}" required>
                                    <option value="Depósito">Depósito (Entrada)</option>
                                    <option value="Retiro">Retiro (Salida)</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="descripcion">Descripción / Concepto</label>
                                <input type="text" class="form-control" id="descripcion"
                                       th:field="*{descripcion}" placeholder="Ej: Pago de servicios">
                            </div>

                            <input type="hidden" th:field="*{fecha}" />

                        </div>

                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary">Confirmar Operación</button>
                            <a th:href="@{/cuentas}" class="btn btn-default">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
