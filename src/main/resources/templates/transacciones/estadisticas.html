<!DOCTYPE html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">

    <title>Sistema X | Estadísticas</title>

    <link rel="stylesheet" href="/dist/css/adminlte.min.css">

    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">

</head>

<body class="hold-transition sidebar-mini">

<div class="wrapper">



    <nav class="main-header navbar navbar-expand navbar-white navbar-light">

        <ul class="navbar-nav ml-auto">

            <li class="nav-item">

                <span class="nav-link"><i class="fas fa-user"></i> <span th:text="${usuarioLogueado}"></span></span>

            </li>

        </ul>

    </nav>



    <aside class="main-sidebar sidebar-dark-primary elevation-4">

        <div class="sidebar">

            <nav class="mt-2">

                <ul class="nav nav-pills nav-sidebar flex-column" role="menu">

                    <li class="nav-item"><a th:href="@{/auth/login}" class="nav-link"><p>Inicio</p></a></li>

                    <li class="nav-item"><a th:href="@{/cuentas}" class="nav-link"><p>Cuentas</p></a></li>


                    <li class="nav-item"><a th:href="@{/estadisticas}" class="nav-link active"><p>Estadísticas</p></a></li>

                    <li class="nav-item"><a th:href="@{/auth/login}" class="nav-link"><p>Salir</p></a></li>

                </ul>

            </nav>

        </div>

    </aside>



    <div class="content-wrapper">

        <section class="content-header"><h1>Estadísticas del Sistema</h1></section>

        <section class="content">

            <div class="container-fluid">

                <div class="row">

                    <div class="col-md-6">

                        <div class="card card-danger">

                            <div class="card-header"><h3 class="card-title">Donut Chart</h3></div>

                            <div class="card-body"><canvas id="donutChart" style="min-height: 250px;"></canvas></div>

                        </div>

                    </div>

                    <div class="col-md-6">

                        <div class="card card-success">

                            <div class="card-header"><h3 class="card-title">Bar Chart</h3></div>

                            <div class="card-body"><canvas id="barChart" style="min-height: 250px;"></canvas></div>

                        </div>

                    </div>

                </div>



            </div>

        </section>

    </div>

</div>



<script src="/plugins/jquery/jquery.min.js"></script>

<script src="/plugins/chart.js/Chart.min.js"></script>



<script th:inline="javascript">
    $(function () {
        // Recuperamos los datos del modelo de Java
        // Importante: Si los ves en 0, es que no hay movimientos con el 'tipo' exacto en la BD
        var totalEntradas = [[${totalEntradas}]];
        var totalSalidas = [[${totalSalidas}]];

        // 1. Gráfica de Dona
        var donutData = {
            labels: ['Entradas ($)', 'Salidas ($)'],
            datasets: [{
                data: [totalEntradas, totalSalidas],
                backgroundColor: ['#28a745', '#dc3545'], // Verde y Rojo
            }]
        }

        var donutOptions = { maintainAspectRatio: false, responsive: true };
        var donutChartCanvas = $('#donutChart').get(0).getContext('2d');
        new Chart(donutChartCanvas, {
            type: 'doughnut',
            data: donutData,
            options: donutOptions
        });

        // 2. Gráfica de Barras
        var barData = {
            labels: ['Balance de Cuenta'],
            datasets: [
                {
                    label: 'Total Entradas',
                    backgroundColor: '#28a745',
                    data: [totalEntradas]
                },
                {
                    label: 'Total Salidas',
                    backgroundColor: '#dc3545',
                    data: [totalSalidas]
                }
            ]
        }

        var barChartCanvas = $('#barChart').get(0).getContext('2d');
        new Chart(barChartCanvas, {
            type: 'bar',
            data: barData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    yAxes: [{ ticks: { beginAtZero: true } }]
                }
            }
        });
    });
</script>

</body>

</html>
